name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        id: eslint
        run: |
          npm run lint > eslint-results.txt || true
          echo "eslint_output=$(cat eslint-results.txt)" >> $GITHUB_OUTPUT
      - name: Run Prettier Check
        id: prettier
        run: |
          npx prettier --check . > prettier-results.txt || true
          echo "prettier_output=$(cat prettier-results.txt)" >> $GITHUB_OUTPUT
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.eslint_output }}`;
            const prettierOutput = `${{ steps.prettier.outputs.prettier_output }}`;
            const commentBody = `## Code Quality Report
            ### ESLint Results
            \`\`\`
            ${eslintOutput || 'No ESLint issues found.'}
            \`\`\`
            ### Prettier Results
            \`\`\`
            ${prettierOutput || 'No Prettier formatting issues found.'}
            \`\`\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Tests with Coverage
        id: tests
        run: |
          npm test -- --coverage > test-coverage.txt || true
          echo "coverage_output=$(cat test-coverage.txt)" >> $GITHUB_OUTPUT
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const coverageOutput = `${{ steps.tests.outputs.coverage_output }}`;
            const commentBody = `## Test Coverage Report
            \`\`\`
            ${coverageOutput || 'No coverage data available.'}
            \`\`\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Dependency Vulnerability Check
        id: vuln-check
        run: |
          npm audit --audit-level moderate > vuln-results.txt || true
          echo "vuln_output=$(cat vuln-results.txt)" >> $GITHUB_OUTPUT
      - name: Scan for Secrets
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3.65.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output: secret-results.txt
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vulnOutput = `${{ steps.vuln-check.outputs.vuln_output }}`;
            const secretOutput = fs.existsSync('secret-results.txt') ? fs.readFileSync('secret-results.txt', 'utf8') : 'No secrets found.';
            const commentBody = `## Security Scan Report
            ### Vulnerabilities (Dependencies)
            \`\`\`
            ${vulnOutput || 'No vulnerabilities found.'}
            \`\`\`
            ### Secrets Scan
            \`\`\`
            ${secretOutput}
            \`\`\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Application
        id: build
        run: |
          npm run build > build-results.txt || true
          echo "build_output=$(cat build-results.txt)" >> $GITHUB_OUTPUT
      - name: Validate Endpoints
        id: endpoints
        run: |
          # Start local server and validate endpoints (adjust port/commands as needed)
          npm start &
          sleep 10
          curl -I http://localhost:3000 > endpoint-results.txt || true
          echo "endpoint_output=$(cat endpoint-results.txt)" >> $GITHUB_OUTPUT
      - name: Upload Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/
      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.build_output }}`;
            const endpointOutput = `${{ steps.endpoints.outputs.endpoint_output }}`;
            const commentBody = `## Build Validation
            ### Build Results
            \`\`\`
            ${buildOutput || 'Build completed successfully.'}
            \`\`\`
            ### Endpoint Validation
            \`\`\`
            ${endpointOutput || 'Endpoint validation completed.'}
            \`\`\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
